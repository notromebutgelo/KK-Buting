name: Apps CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  admin-panel-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Build admin-panel
        run: npm run build:admin

  youth-pwa-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Build youth-pwa
        run: npm run build:youth

  merchant-app-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.4
          cache: npm

      - name: Install workspace dependencies
        run: npm ci

      - name: Typecheck merchant-app
        run: npm run typecheck:merchant
